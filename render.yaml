services:
  - type: web
    name: el-izdehar-inc-web
    runtime: node
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: el-izdehar-inc-db
          property: connectionString

databases:
  - name: el-izdehar-inc-db
    databaseName: elizdehar_db
    plan: starter
